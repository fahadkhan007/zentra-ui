<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.25"/>

  <!-- Z letterform -->
  <g filter="url(#glow)">
    <!-- Top bar of Z -->
    <line x1="18" y1="18" x2="46" y2="18" stroke="url(#zGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Diagonal of Z -->
    <line x1="46" y1="18" x2="18" y2="46" stroke="url(#zGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Bottom bar of Z -->
    <line x1="18" y1="46" x2="46" y2="46" stroke="url(#zGrad)" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- Corner accent dot -->
  <circle cx="46" cy="18" r="2.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="18" cy="46" r="2.5" fill="#7c3aed" opacity="0.8"/>
</svg>
